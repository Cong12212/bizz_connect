name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Create .env for production
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          {
            echo "APP_NAME=BizConnect"
            echo "APP_ENV=production"
            printf "APP_KEY=%s\n" "$APP_KEY"
            echo "APP_DEBUG=false"
            echo "APP_URL=https://biz-connect.online"
            echo "FRONTEND_URL=https://biz-connect.online"
            echo "APP_LOCALE=en"
            echo "APP_FALLBACK_LOCALE=en"
            echo ""
            echo "LOG_CHANNEL=stack"
            echo "LOG_LEVEL=error"
            echo ""
            echo "DB_CONNECTION=mysql"
            echo "DB_HOST=localhost"
            echo "DB_PORT=3306"
            printf "DB_DATABASE=%s\n" "$DB_DATABASE"
            printf "DB_USERNAME=%s\n" "$DB_USERNAME"
            printf "DB_PASSWORD=%s\n" "$DB_PASSWORD"
            echo ""
            echo "SESSION_DRIVER=file"
            echo "SESSION_LIFETIME=120"
            echo "CACHE_STORE=file"
            echo "QUEUE_CONNECTION=database"
            echo ""
            echo "MAIL_MAILER=smtp"
            echo "MAIL_HOST=smtp.hostinger.com"
            echo "MAIL_PORT=465"
            echo "MAIL_ENCRYPTION=ssl"
            printf "MAIL_USERNAME=%s\n" "$MAIL_USERNAME"
            printf "MAIL_PASSWORD=%s\n" "$MAIL_PASSWORD"
            printf "MAIL_FROM_ADDRESS=%s\n" "$MAIL_USERNAME"
            printf "MAIL_FROM_NAME=%s\n" '"Biz Connect"'
            echo ""
            echo "L5_SWAGGER_CONST_HOST=https://biz-connect.online/backend/public"
            echo "L5_SWAGGER_GENERATE_ALWAYS=true"
            echo "L5_SWAGGER_USE_ABSOLUTE_PATH=false"
            echo ""
            printf "GEMINI_API_KEY=%s\n" "$GEMINI_API_KEY"
          } > .env.production

      - name: Deploy files via rsync
        run: |
          for i in 1 2 3; do
            rsync -avz --progress --delete \
              -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
              --exclude='.git' \
              --exclude='vendor/' \
              --exclude='node_modules/' \
              --exclude='.env' \
              --exclude='.env.production' \
              --exclude='storage/*.key' \
              ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u564264509/domains/biz-connect.online/public_html/backend/ && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Upload .env to server
        run: |
          scp -P ${{ secrets.SSH_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            .env.production \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u564264509/domains/biz-connect.online/public_html/backend/.env

      - name: Setup Backend Environment
        run: |
          ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} bash -s << 'SCRIPT'
            set -e
            cd /home/u564264509/domains/biz-connect.online/public_html/backend

            echo "===== PHP Version ====="
            php -v

            chmod 644 .env

            echo "===== Installing Composer dependencies ====="
            if command -v composer &> /dev/null; then
              composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs
            else
              php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs
            fi

            echo "===== Setting permissions ====="
            chmod -R 775 storage bootstrap/cache
            find storage -type f -exec chmod 664 {} \;
            find storage -type d -exec chmod 775 {} \;

            echo "===== Clearing all caches ====="
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            echo "===== Running migrations ====="
            php artisan migrate --force --verbose

            echo "===== Generating Swagger documentation ====="
            php artisan l5-swagger:generate

            echo "===== Caching config ====="
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "===== Deployment completed successfully! ====="
          SCRIPT
